# Stack local: MySQL + API + Kiosk (Vite).
# Host: MySQL 6010, API 6005, UI 2302 (kiosk).
#
# Persistência:
#   - MySQL: volume meoweats_mysql_data (categorias, produtos, pedidos, imagemUrl, etc.)
#   - Fotos de categoria/produto: pasta ./uploads no host (montada em /app/uploads na API)
services:
  mysql:
    image: mysql:8.0
    container_name: meoweats-mysql
    restart: unless-stopped
    volumes:
      - meoweats_mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: meoweats_root
      MYSQL_DATABASE: meoweats
      MYSQL_USER: meoweats
      MYSQL_PASSWORD: meoweats
    ports:
      - "6010:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-umeoweats",
          "-pmeoweats",
          "--silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: meoweats-api
    restart: unless-stopped
    ports:
      - "6005:6005"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      PORT: "6005"
      UPLOADS_DIR: /app/uploads
      DATABASE_URL: mysql://meoweats:meoweats@mysql:3306/meoweats?timezone=Z
      # Bridge TEF roda no host (dotnet run); dentro do container use host.docker.internal
      TEF_BRIDGE_HTTP_URL: http://host.docker.internal:5099
      TZ: America/Cuiaba
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:6005/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

  kiosk:
    build:
      context: .
      dockerfile: docker/Dockerfile.kiosk
    container_name: meoweats-kiosk
    restart: unless-stopped
    ports:
      - "2302:6001"
    environment:
      PORT: "6001"
      BASE_PATH: /
      API_URL: http://api:6005
      TZ: America/Cuiaba
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:6001/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 25
      start_period: 120s

volumes:
  meoweats_mysql_data:
