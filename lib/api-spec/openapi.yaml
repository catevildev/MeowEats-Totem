openapi: 3.1.0
info:
  title: API
  version: 0.1.0
  description: Restaurant Self-Service Kiosk API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Verificação de saúde da aplicação
  - name: categorias
    description: Gerenciamento de categorias de produtos
  - name: produtos
    description: Gerenciamento de produtos
  - name: pedidos
    description: Gerenciamento de pedidos
  - name: impressoras
    description: Gerenciamento de impressoras
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [ health ]
      summary: Status de Saúde da API
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
      description: Verifica o status de saúde da API. Usado por balanceadores de carga e monitores de uptime para garantir que
        o sistema está online.

  /categorias:
    get:
      operationId: listarCategorias
      tags: [ categorias ]
      summary: Listar todas as categorias
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Categoria"
      description: Recupera a lista de todas as categorias de produtos. Útil para montar o menu de navegação do Kiosk e a tela
        de listagem do painel Administrativo.
    post:
      operationId: criarCategoria
      tags: [ categorias ]
      summary: Criar nova categoria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarCategoriaInput"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Categoria"
      description: "Cadastra uma nova categoria no banco de dados. Categorias agrupam produtos (ex: Lanches, Bebidas) e
        facilitam a navegação do cliente."

  /categorias/{id}:
    put:
      operationId: atualizarCategoria
      tags: [ categorias ]
      summary: Atualizar categoria
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarCategoriaInput"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Categoria"
      description: Atualiza os dados de uma categoria existente (nome, ordem de exibição, foto, etc).
    delete:
      operationId: excluirCategoria
      tags: [ categorias ]
      summary: Excluir categoria
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Category deleted
      description: "Remove permanentemente uma categoria do sistema. Nota: Produtos atrelados podem precisar ser reatribuídos
        a outra categoria."

  /produtos:
    get:
      operationId: listarProdutos
      tags: [ produtos ]
      summary: Listar todos os produtos
      parameters:
        - name: categoria
          in: query
          required: false
          schema:
            type: integer
        - name: ativo
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Produto"
      description: Lista todos os produtos do cardápio. Permite filtragem por categoria e status (ativo/inativo). Usado
        pesadamente na tela principal do Kiosk.
    post:
      operationId: criarProduto
      tags: [ produtos ]
      summary: Cadastrar novo produto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarProdutoInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Produto"
      description: Adiciona um novo produto ao catálogo. Inclui informações vitais como preço, nome, imagem, descrição e
        adicionais permitidos.

  /produtos/{id}:
    get:
      operationId: buscarProduto
      tags: [ produtos ]
      summary: Buscar produto por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Produto"
        "404":
          description: Product not found
      description: Retorna todos os detalhes de um produto específico através do seu ID, incluindo os itens extras/adicionais
        vinculados para personalização.
    put:
      operationId: atualizarProduto
      tags: [ produtos ]
      summary: Atualizar produto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarProdutoInput"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Produto"
      description: Edita as informações de um produto existente, permitindo alteração rápida de preço, nome ou troca de imagem.
    delete:
      operationId: excluirProduto
      tags: [ produtos ]
      summary: Excluir produto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Product deleted
      description: Deleta um produto do sistema. Caso o produto já esteja em pedidos antigos, o histórico de relatórios de
        pedidos será mantido intacto.

  /pedidos:
    get:
      operationId: listarPedidos
      tags: [ pedidos ]
      summary: Listar histórico de pedidos
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ novo, em_preparo, pronto, entregue, cancelado ]
        - name: data
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pedido"
      description: Busca o histórico de pedidos realizados. Pode ser filtrado por status (Novo, Em Preparo, Pronto) para
        popular perfeitamente as telas da Cozinha e Painel de TV.
    post:
      operationId: criarPedido
      tags: [ pedidos ]
      summary: Criar novo pedido
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarPedidoInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pedido"
      description: Registra e finaliza um novo pedido feito pelo Kiosk. Salva todos os itens, adicionais, gera o número
        sequencial do pedido e dispara a impressão na cozinha instantaneamente.

  /pedidos/{id}:
    get:
      operationId: buscarPedido
      tags: [ pedidos ]
      summary: Buscar pedido por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pedido"
      description: Recupera o detalhamento completo de um único pedido pelo ID, incluindo todos os produtos selecionados e a
        forma de pagamento aprovada.

  /pedidos/{id}/imprimir:
    post:
      operationId: imprimirPedido
      tags: [ pedidos ]
      summary: Reimprimir comanda do pedido
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Print successful
      description: Envia um comando para a impressora térmica ativa para reimprimir a nota (comanda) de um pedido já existente.

  /fiscal/nfce/emitir/{pedidoId}:
    post:
      operationId: emitirNfce
      tags: [ fiscal ]
      summary: Emitir NFC-e (PlugNotas)
      parameters:
        - name: pedidoId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: object
      responses:
        "202":
          description: Emissão aceita ou em processamento
        "500":
          description: Internal server error
      description: Gera e emite a Nota Fiscal de Consumidor Eletrônica (NFC-e) para um pedido específico junto à SEFAZ via
        integração com a API da PlugNotas.

  /pedidos/{id}/status:
    patch:
      operationId: atualizarStatusPedido
      tags: [ pedidos ]
      summary: Atualizar status do pedido
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AtualizarStatusInput"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pedido"
      description: "Avança o status de um pedido no fluxo de trabalho. Ex: Move de 'Novo' para 'Em Preparo' ou 'Pronto'.
        Atualiza as telas da Cozinha e TV em tempo real."

  /relatorios/vendas:
    get:
      operationId: relatorioVendas
      tags: [ pedidos ]
      summary: Sales report
      parameters:
        - name: data
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Sales report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelatorioVendas"
      description: Sales report. Rota de manipulação de dados (GET) exposta pela API do Totem.

  /impressoras:
    get:
      operationId: listarImpressoras
      tags: [ impressoras ]
      summary: Listar impressoras cadastradas
      responses:
        "200":
          description: List of printers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Impressora"
      description: Lista as configurações de impressoras térmicas salvas no sistema, verificando quais estão ativas, além de
        seus IPs e larguras de papel (58mm/80mm).
    post:
      operationId: criarImpressora
      tags: [ impressoras ]
      summary: Cadastrar nova impressora
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarImpressoraInput"
      responses:
        "201":
          description: Printer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Impressora"
      description: Cadastra uma nova impressora térmica de rede (IP ou USB) para impressão automática de comandas e senhas
        para os clientes.

  /impressoras/{id}:
    put:
      operationId: atualizarImpressora
      tags: [ impressoras ]
      summary: Atualizar impressora
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarImpressoraInput"
      responses:
        "200":
          description: Printer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Impressora"
      description: Edita as configurações de uma impressora existente (endereço IP, largura do papel, se está ativa ou inativa).
    delete:
      operationId: excluirImpressora
      tags: [ impressoras ]
      summary: Excluir impressora
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Printer deleted
      description: Deleta uma impressora do sistema. As impressões passarão a buscar outra impressora ativa caso exista no
        banco de dados.

  /impressoras/{id}/test:
    post:
      operationId: testarImpressora
      tags: [ impressoras ]
      summary: Print test page
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test successful
      description: Print test page. Rota de manipulação de dados (POST) exposta pela API do Totem.

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Categoria:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        icone:
          type: string
          nullable: true
        imagemUrl:
          type: string
          nullable: true
        ordem:
          type: integer
      required:
        - id
        - nome
        - ordem

    CriarCategoriaInput:
      type: object
      properties:
        nome:
          type: string
        icone:
          type: string
          nullable: true
        imagemUrl:
          type: string
          nullable: true
        ordem:
          type: integer
      required:
        - nome
        - ordem

    Produto:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        descricao:
          type: string
          nullable: true
        preco:
          type: number
        categoriaId:
          type: integer
        imagem:
          type: string
          nullable: true
        ativo:
          type: boolean
        extras:
          type: array
          items:
            $ref: "#/components/schemas/Extra"
        categoria:
          $ref: "#/components/schemas/Categoria"
          nullable: true
      required:
        - id
        - nome
        - preco
        - categoriaId
        - ativo
        - extras

    Extra:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        preco:
          type: number
        tipo:
          type: string
          enum: [ adicional, remocao, tamanho ]
        grupoTitulo:
          type: string
        modoSelecao:
          type: string
          enum: [ multipla, unica, sim_nao ]
        maxSelecoes:
          type: integer
        obrigatorio:
          type: boolean
        ordemGrupo:
          type: integer
        ordemItem:
          type: integer
        imagem:
          type: string
          nullable: true
          description: URL da foto da opção no totem (/api/uploads/...)
      required:
        - id
        - nome
        - preco
        - tipo
        - grupoTitulo
        - modoSelecao
        - maxSelecoes
        - obrigatorio
        - ordemGrupo
        - ordemItem

    CriarProdutoInput:
      type: object
      properties:
        nome:
          type: string
        descricao:
          type: string
          nullable: true
        preco:
          type: number
        categoriaId:
          type: integer
        imagem:
          type: string
          nullable: true
        ativo:
          type: boolean
        extras:
          type: array
          items:
            $ref: "#/components/schemas/CriarExtraInput"
      required:
        - nome
        - preco
        - categoriaId
        - ativo

    CriarExtraInput:
      type: object
      properties:
        nome:
          type: string
        preco:
          type: number
        tipo:
          type: string
          enum: [ adicional, remocao, tamanho ]
        grupoTitulo:
          type: string
        modoSelecao:
          type: string
          enum: [ multipla, unica, sim_nao ]
        maxSelecoes:
          type: integer
        obrigatorio:
          type: boolean
        ordemGrupo:
          type: integer
        ordemItem:
          type: integer
        imagem:
          type: string
          nullable: true
      required:
        - nome
        - preco
        - tipo

    ItemPedido:
      type: object
      properties:
        id:
          type: integer
        pedidoId:
          type: integer
        produtoId:
          type: integer
        quantidade:
          type: integer
        preco:
          type: number
        observacoes:
          type: string
          nullable: true
        extrasIds:
          type: array
          items:
            type: integer
        produto:
          $ref: "#/components/schemas/Produto"
          nullable: true
      required:
        - id
        - pedidoId
        - produtoId
        - quantidade
        - preco
        - extrasIds

    CriarItemPedidoInput:
      type: object
      properties:
        produtoId:
          type: integer
        quantidade:
          type: integer
        observacoes:
          type: string
          nullable: true
        extrasIds:
          type: array
          items:
            type: integer
      required:
        - produtoId
        - quantidade
        - extrasIds

    Pedido:
      type: object
      properties:
        id:
          type: integer
        numero:
          type: string
        status:
          type: string
          enum: [ novo, em_preparo, pronto, entregue, cancelado ]
        total:
          type: number
        tipoPedido:
          type: string
          enum: [ comer_aqui, para_viagem ]
        formaPagamento:
          type: string
          enum: [ credito, debito, pix, nfc ]
          nullable: true
        criadoEm:
          type: string
        itens:
          type: array
          items:
            $ref: "#/components/schemas/ItemPedido"
      required:
        - id
        - numero
        - status
        - total
        - tipoPedido
        - criadoEm
        - itens

    CriarPedidoInput:
      type: object
      properties:
        tipoPedido:
          type: string
          enum: [ comer_aqui, para_viagem ]
        formaPagamento:
          type: string
          enum: [ credito, debito, pix, nfc ]
        itens:
          type: array
          items:
            $ref: "#/components/schemas/CriarItemPedidoInput"
      required:
        - tipoPedido
        - formaPagamento
        - itens

    AtualizarStatusInput:
      type: object
      properties:
        status:
          type: string
          enum: [ novo, em_preparo, pronto, entregue, cancelado ]
      required:
        - status

    RelatorioVendas:
      type: object
      properties:
        totalVendas:
          type: number
        totalPedidos:
          type: integer
        ticketMedio:
          type: number
        produtosMaisVendidos:
          type: array
          items:
            $ref: "#/components/schemas/ProdutoVendido"
        vendasPorHora:
          type: array
          items:
            $ref: "#/components/schemas/VendaPorHora"
      required:
        - totalVendas
        - totalPedidos
        - ticketMedio
        - produtosMaisVendidos
        - vendasPorHora

    ProdutoVendido:
      type: object
      properties:
        produto:
          type: string
        quantidade:
          type: integer
        total:
          type: number
      required:
        - produto
        - quantidade
        - total

    VendaPorHora:
      type: object
      properties:
        hora:
          type: string
        total:
          type: number
        quantidade:
          type: integer
      required:
        - hora
        - total
        - quantidade

    Impressora:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        tipoConexao:
          type: string
          enum: [ rede, usb ]
        endereco:
          type: string
        larguraPapel:
          type: string
          enum: [ 80mm, 58mm ]
        margemEsquerda:
          type: integer
        margemDireita:
          type: integer
        ativa:
          type: boolean
        criadoEm:
          type: string
        atualizadoEm:
          type: string
      required:
        - id
        - nome
        - tipoConexao
        - endereco
        - larguraPapel
        - margemEsquerda
        - margemDireita
        - ativa
        - criadoEm
        - atualizadoEm

    CriarImpressoraInput:
      type: object
      properties:
        nome:
          type: string
        tipoConexao:
          type: string
          enum: [ rede, usb ]
        endereco:
          type: string
        larguraPapel:
          type: string
          enum: [ 80mm, 58mm ]
        margemEsquerda:
          type: integer
        margemDireita:
          type: integer
        ativa:
          type: boolean
      required:
        - nome
        - endereco
