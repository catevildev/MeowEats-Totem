packages:
  "framer-motion": "For smooth transitions between kiosk screens and engaging animations"
  "recharts": "For admin dashboard sales charts and analytics"
  "date-fns": "For formatting dates in order history and TV display"
  "qrcode.react": "To display a mock PIX/Payment QR code on the payment screen"
  "lucide-react": "For beautiful consistent iconography"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility function to efficiently merge Tailwind CSS classes"

images:
  - path: "artifacts/kiosk/public/images/kiosk-hero.png"
    description: "Appetizing, high-quality, vibrant 3D illustration of a delicious double cheeseburger with fries splashing around, warm orange and red gradient background, dynamic lighting, suitable for a fast-food kiosk welcome screen"
    aspect_ratio: "16:9"
  - path: "artifacts/kiosk/public/images/logo.png"
    description: "Modern, bold, flat vector logo for a fast-food burger joint called 'BURGER BITE', using warm colors like flame red and cheese yellow, transparent background"
    aspect_ratio: "1:1"

notes:
  - "The app uses a unified Kiosk flow at the root '/' route."
  - "Kitchen and TV displays use polling (refetchInterval) for real-time updates without websockets."
  - "Admin panel is routed under '/admin'."
  - "Assuming @workspace/api-client-react exports all React Query hooks directly from index."
